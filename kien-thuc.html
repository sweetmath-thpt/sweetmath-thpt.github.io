<body>
<p>KIẾN THỨC</p>
<p>Bấm vào để học những gì bạn muốn học:</p>
<label for="aspect">Bạn muốn học kiến thức phân môn nào?</label>
<select name="aspect" id="aspect">
  <option value="ALL-PM">Tất cả</option>
  <option value="AL-CA">Đại số - Giải tích</option>
  <option value="COMB">Tổ hợp</option>
  <option value="GEOM">Hình học</option>
  <option value="STAT">Thống kê</option>
  <option value="THEO">Lý thuyết số</option>
</select>
<label for="class">Bạn muốn học kiến thức lớp mấy?</label>
<select name="class" id="class">
  <option value="ALL-CLASS">Tất cả</option>
  <option value="lop10">Lớp 10</option>
  <option value="lop11">Lớp 11</option>
  <option value="lop12">Lớp 12</option>
</select>
<button id="GO">VÀO HỌC NGAY!</button>

<script>
      document.getElementById('GO').addEventListener('click', function() {
      // Lấy giá trị user chọn (nếu rỗng thì tự hiểu là 'none')
      const aspectValue = document.getElementById('aspect').value || 'none';
      const classValue = document.getElementById('class').value || 'none';

      // Ghép thành 1 cái chìa khóa (key)
      const lookupKey = `${aspectValue}_${classValue}`;

      // "Sổ địa chỉ" chứa mọi đường link bạn muốn điều hướng tới
      const routeMap = {
      // ---- TRƯỜNG HỢP CHỌN CẢ 2 ----
      "AL-CA_lop10": "/daisogiaitich10.html",
      "AL-CA_lop11": "/daisogiaitich11.html",
      "COMB_lop10": "/tohop10.html",
      "GEOM_lop12": "/hinhhoc12.html",
      // ... Khai báo thêm các tổ hợp khác tương tự ...

      // ---- TRANG TỔNG: CHỈ CHỌN 1 TRONG 2 ----
      "AL-CA_none": "/daisogiaitich.html", // Chỉ chọn Đại số, không chọn lớp
      "none_lop10": "/lop10.html", // Chỉ chọn Lớp 10, không chọn môn
      "THEO_none": "/lythuyetso.html",

      // ---- TRANG TỔNG QUÁT: KHÔNG CHỌN GÌ CẢ ----
      "none_none": "../kienthuc.html" // Không chọn gì thì về trang chính
    };

  // Tra cứu key trong sổ địa chỉ
  const targetLink = routeMap[lookupKey];

  if (targetLink) {
    // Có link thì bay thẳng sang trang đó
    window.location.href = targetLink;
  } else {
    // Phòng hờ tổ hợp bạn chưa làm trang thì báo lỗi thay vì bị lỗi trắng trang
    alert("Trang tài liệu này đang được xây dựng, bạn chọn mục khác nhé!");
  }
});
</script>
  
</body>
</html>
